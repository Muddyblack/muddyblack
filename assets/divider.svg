<svg xmlns="http://www.w3.org/2000/svg" width="900" height="14" viewBox="0 0 900 14" role="presentation">
  <defs>
    <linearGradient id="d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#A855F7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="s" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="6" width="900" height="2" fill="url(#d)" rx="1"/>
  <rect y="6" width="140" height="2" fill="url(#s)" rx="1">
    <animate attributeName="x" from="-140" to="900" dur="3.6s" repeatCount="indefinite"/>
  </rect>
  <circle cx="450" cy="7" r="3" fill="#A855F7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
</svg>
