<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220" role="img" aria-label="When I ship: night 43%, evening 30%, day 22%, morning 5%">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="clipN"><rect x="120" y="32" width="0" height="14" rx="7">
      <animate attributeName="width" from="0" to="180.6" dur="0.9s" begin="0.10s" fill="freeze"
               calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect></clipPath>
    <clipPath id="clipM"><rect x="120" y="72" width="0" height="14" rx="7">
      <animate attributeName="width" from="0" to="21" dur="0.9s" begin="0.25s" fill="freeze"
               calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect></clipPath>
    <clipPath id="clipE"><rect x="120" y="112" width="0" height="14" rx="7">
      <animate attributeName="width" from="0" to="126" dur="0.9s" begin="0.40s" fill="freeze"
               calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect></clipPath>
    <clipPath id="clipD"><rect x="120" y="152" width="0" height="14" rx="7">
      <animate attributeName="width" from="0" to="92.4" dur="0.9s" begin="0.55s" fill="freeze"
               calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect></clipPath>

    <style>
      .label { font: 600 13px 'JetBrains Mono', ui-monospace, monospace; fill: #C9D1D9; }
      .pct   { font: 600 13px 'JetBrains Mono', ui-monospace, monospace; fill: #8B95A7; }
      .head  { font: 600 11px 'JetBrains Mono', ui-monospace, monospace; fill: #6366F1; letter-spacing: 2px; }
      .track { fill: #161B22; }
    </style>
  </defs>

  <rect width="640" height="220" fill="#0D1117" rx="10"/>
  <text x="24" y="22" class="head">WHEN&#160;I&#160;SHIP</text>

  <!-- night : 43% -->
  <text x="24"  y="44" class="label">night</text>
  <rect x="120" y="32" width="420" height="14" rx="7" class="track"/>
  <g clip-path="url(#clipN)">
    <rect x="120" y="32" width="420" height="14" rx="7" fill="url(#barGrad)"/>
    <rect x="-80" y="32" width="80" height="14" fill="url(#shimmer)">
      <animate attributeName="x" from="120" to="540" dur="2.2s" begin="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="556" y="44" class="pct">43%</text>

  <!-- morning : 30% -->
  <text x="24"  y="84" class="label">morning</text>
  <rect x="120" y="72" width="420" height="14" rx="7" class="track"/>
  <g clip-path="url(#clipM)">
    <rect x="120" y="72" width="420" height="14" rx="7" fill="url(#barGrad)"/>
    <rect x="-80" y="72" width="80" height="14" fill="url(#shimmer)">
      <animate attributeName="x" from="120" to="540" dur="2.6s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="556" y="84" class="pct">5%</text>

  <!-- evening : 22% -->
  <text x="24"  y="124" class="label">evening</text>
  <rect x="120" y="112" width="420" height="14" rx="7" class="track"/>
  <g clip-path="url(#clipE)">
    <rect x="120" y="112" width="420" height="14" rx="7" fill="url(#barGrad)"/>
    <rect x="-80" y="112" width="80" height="14" fill="url(#shimmer)">
      <animate attributeName="x" from="120" to="540" dur="3.0s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="556" y="124" class="pct">30%</text>

  <!-- day : 5% -->
  <text x="24"  y="164" class="label">day</text>
  <rect x="120" y="152" width="420" height="14" rx="7" class="track"/>
  <g clip-path="url(#clipD)">
    <rect x="120" y="152" width="420" height="14" rx="7" fill="url(#barGrad)"/>
    <rect x="-80" y="152" width="80" height="14" fill="url(#shimmer)">
      <animate attributeName="x" from="120" to="540" dur="3.4s" begin="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="556" y="164" class="pct">22%</text>

  <text x="24" y="204" class="pct">utc+1 · germany / france</text>
</svg>
