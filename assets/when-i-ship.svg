<svg xmlns="http://www.w3.org/2000/svg" width="640" height="280" viewBox="0 0 640 280"
     role="img" aria-label="When I ship: evening 36% · day 22% · morning 21% · afternoon 12% · night 10%">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip0"><rect x="120" y="32" width="0" height="14" rx="7">
      <animate attributeName="width" from="0" to="150.7" dur="0.9s" begin="0.1s" fill="freeze"
               calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect></clipPath>
    <clipPath id="clip1"><rect x="120" y="72" width="0" height="14" rx="7">
      <animate attributeName="width" from="0" to="93.1" dur="0.9s" begin="0.25s" fill="freeze"
               calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect></clipPath>
    <clipPath id="clip2"><rect x="120" y="112" width="0" height="14" rx="7">
      <animate attributeName="width" from="0" to="86.4" dur="0.9s" begin="0.4s" fill="freeze"
               calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect></clipPath>
    <clipPath id="clip3"><rect x="120" y="152" width="0" height="14" rx="7">
      <animate attributeName="width" from="0" to="49.1" dur="0.9s" begin="0.55s" fill="freeze"
               calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect></clipPath>
    <clipPath id="clip4"><rect x="120" y="192" width="0" height="14" rx="7">
      <animate attributeName="width" from="0" to="40.6" dur="0.9s" begin="0.7s" fill="freeze"
               calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect></clipPath>
    <style>
      .label { font: 600 13px 'JetBrains Mono', ui-monospace, monospace; fill: #C9D1D9; }
      .pct   { font: 600 13px 'JetBrains Mono', ui-monospace, monospace; fill: #8B95A7; }
      .head  { font: 600 11px 'JetBrains Mono', ui-monospace, monospace; fill: #6366F1; letter-spacing: 2px; }
      .track { fill: #161B22; }
    </style>
  </defs>

  <rect width="640" height="280" fill="#0D1117" rx="10"/>
  <text x="24" y="22" class="head">WHEN&#160;I&#160;SHIP</text>

  <!-- evening : 36% -->
  <text x="24" y="46" class="label">evening</text>
  <rect x="120" y="32" width="420" height="14" rx="7" class="track"/>
  <g clip-path="url(#clip0)">
    <rect x="120" y="32" width="420" height="14" rx="7" fill="url(#barGrad)"/>
    <rect x="-80" y="32" width="80" height="14" fill="url(#shimmer)">
      <animate attributeName="x" from="120" to="540" dur="2.2s" begin="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="556" y="46" class="pct">36%</text>

  <!-- day : 22% -->
  <text x="24" y="86" class="label">day</text>
  <rect x="120" y="72" width="420" height="14" rx="7" class="track"/>
  <g clip-path="url(#clip1)">
    <rect x="120" y="72" width="420" height="14" rx="7" fill="url(#barGrad)"/>
    <rect x="-80" y="72" width="80" height="14" fill="url(#shimmer)">
      <animate attributeName="x" from="120" to="540" dur="2.6s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="556" y="86" class="pct">22%</text>

  <!-- morning : 21% -->
  <text x="24" y="126" class="label">morning</text>
  <rect x="120" y="112" width="420" height="14" rx="7" class="track"/>
  <g clip-path="url(#clip2)">
    <rect x="120" y="112" width="420" height="14" rx="7" fill="url(#barGrad)"/>
    <rect x="-80" y="112" width="80" height="14" fill="url(#shimmer)">
      <animate attributeName="x" from="120" to="540" dur="3.0s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="556" y="126" class="pct">21%</text>

  <!-- afternoon : 12% -->
  <text x="24" y="166" class="label">afternoon</text>
  <rect x="120" y="152" width="420" height="14" rx="7" class="track"/>
  <g clip-path="url(#clip3)">
    <rect x="120" y="152" width="420" height="14" rx="7" fill="url(#barGrad)"/>
    <rect x="-80" y="152" width="80" height="14" fill="url(#shimmer)">
      <animate attributeName="x" from="120" to="540" dur="3.4s" begin="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="556" y="166" class="pct">12%</text>

  <!-- night : 10% -->
  <text x="24" y="206" class="label">night</text>
  <rect x="120" y="192" width="420" height="14" rx="7" class="track"/>
  <g clip-path="url(#clip4)">
    <rect x="120" y="192" width="420" height="14" rx="7" fill="url(#barGrad)"/>
    <rect x="-80" y="192" width="80" height="14" fill="url(#shimmer)">
      <animate attributeName="x" from="120" to="540" dur="3.8s" begin="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="556" y="206" class="pct">10%</text>

  <text x="24" y="264" class="pct">utc+1 · germany / france · last 365 days · 248 commits</text>
</svg>
